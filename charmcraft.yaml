# This file configures Charmcraft.
# See https://juju.is/docs/sdk/charmcraft-config for guidance.
name: mattermost-k8s
type: charm
base: ubuntu@24.04

# the platforms this charm should be built on and run on.
# you can check your architecture with `dpkg --print-architecture`
platforms:
  amd64:

# (Required)
summary: Mattermost is a flexible, open source messaging platform that enables secure team collaboration.

# (Required)
description: |
  Mattermost is a flexible, open source messaging platform that enables secure team collaboration. 
  It provides a self-hosted alternative to proprietary messaging services, allowing teams to communicate and collaborate effectively while maintaining control over their data.
  Check https://mattermost.com for more information.

extensions:
  - go-framework

requires:
  postgresql:
    interface: postgresql_client
    optional: false
    limit: 1
  s3:
    interface: s3
    optional: true
    limit: 1
  oauth:
    interface: oauth
    optional: true
    limit: 1
  saml:
    interface: saml
    optional: true
    limit: 1
  smtp:
    interface: smtp
    optional: true
    limit: 1

config:
  options:
    oauth-scopes:
      type: string
      description: |
        Space-separated list of OAuth/OIDC scopes to request. Must include "openid".
        Used when the oauth relation is active.
      default: "openid email profile"
    oauth-redirect-path:
      type: string
      description: |
        The redirect path for the OAuth/OIDC callback. Mattermost's OpenID Connect
        callback endpoint is /signup/openid/complete.
      default: "/signup/openid/complete"

