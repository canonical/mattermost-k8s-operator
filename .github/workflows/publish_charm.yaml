name: Publish to edge

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish-to-edge:
    uses: canonical/operator-workflows/.github/workflows/publish_charm.yaml@main
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
    with:
      channel: latest/edge
      resource-mapping: '{"mattermost": "app-image"}'
